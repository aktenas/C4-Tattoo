<!DOCTYPE html>
<!--accessibility-->
<html lang="en">
<head>
    <!--encoding (for symbols etc.)-->
    <meta charset="UTF-8">
    <!--responsive design (match device screen size)-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C4 TATTOO</title>
    <!--load bootstrap 5 with CDN (appearance)-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!--load vectors-->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!--import css-->
    <link rel="stylesheet" href="css/styles.css">
    <!--import jquery for DOM-->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" defer></script>
    <!--import boostrap 5 javascript (functionality)-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
    <!--import app script-->
    <script src="js/app.js" defer></script>
</head>
<body class="studio-body">
    <!--navigation section-->
    <header id="global-header" class="sticky-top"></header>
    
    <!--main page area positioned below the header-->
    <main class="container-fluid my-5 py-4">
        <div class="page-shell">
            
            <!-- Unified Navigation Return Element -->
            <div class="text-start mb-4">
                <a href="index.html" class="text-decoration-none" style="color: #FF0000; font-family: 'Special Elite', monospace; letter-spacing: 0.1em; font-size: 0.9rem; font-weight: bold;">
                    <i class="fa-solid fa-arrow-left me-2"></i> BACK
                </a>
            </div>

            <!-- Header Section -->
            <h1 class="page-title text-start mb-2">ABOUT US</h1>
            <div class="red-accent-line"></div>
            
            <div class="row mb-5">
                <div class="col-lg-12">
                    <p class="fs-5" style="color: #bcbcbc; line-height: 1.7; text-align: justify;">
                        A bit about our staff.
                    </p>
                </div>
            </div>

            <h2 class="display-6 text-uppercase fw-bold text-white mb-4" style="font-family: 'Impact', sans-serif; letter-spacing: 0.05em;">TATTOO ARTISTS & PIERCERS</h2>

            <!-- Artist Showcase -->
            <div class="row g-4">
                
                <!-- monster energy -->
                <div class="col-md-4">
                    <div class="studio-card">
                        <div class="studio-card-media p-0 overflow-hidden" style="height: 280px;">
                            <img src="images/monster-energy-tattoer-piercer.webp" alt="Monster Energy Portrait" class="img-fluid w-100 h-100" style="object-fit: cover;">
                        </div>
                        <div class="studio-card-content">
                            <h3>MONSTER ENERGY</h3>
                            <p style="height: auto; margin-bottom: 15px;">Tattoo Artist & Piercer</p>
                            <span class="text-red-accent d-block mb-3">// 8 YEARS OF EXPERIENCE</span>
                            <a href="tasks.html" class="btn btn-red w-100">View Booking Slot</a>
                        </div>
                    </div>
                </div>

                <!-- oreo -->
                <div class="col-md-4">
                    <div class="studio-card">
                        <div class="studio-card-media p-0 overflow-hidden" style="height: 280px;">
                            <img src="images/oreo-piercing-tattoo.jpg" alt="oreo Portrait" class="img-fluid w-100 h-100" style="object-fit: cover;">
                        </div>
                        <div class="studio-card-content">
                            <h3>OREO</h3>
                            <p style="height: auto; margin-bottom: 15px;">Tatto artist & Piercer</p>
                            <span class="text-red-accent d-block mb-3">// STUDENT</span>
                            <a href="tasks.html" class="btn btn-red w-100">View Booking Slot</a>
                        </div>
                    </div>
                </div>

                <!-- RUBY RED -->
                <div class="col-md-4">
                    <div class="studio-card">
                        <div class="studio-card-media p-0 overflow-hidden" style="height: 280px;">
                            <img src="images/ruby-red-tattoo-piercer.jpg" alt="RUBY RED Portrait" class="img-fluid w-100 h-100" style="object-fit: cover;">
                        </div>
                        <div class="studio-card-content">
                            <h3>RUBY RED</h3>
                            <p style="height: auto; margin-bottom: 15px;">Tattoo artist & Piercer</p>
                            <span class="text-red-accent d-block mb-3">// NEW TO C4 TATTOO</span>
                            <a href="tasks.html" class="btn btn-red w-100">View Booking Slot</a>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>
    <footer id="global-footer"></footer>
</body>
</html>
