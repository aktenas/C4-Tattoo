<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C4 TATTOO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
    <script src="js/app.js" defer></script>
</head>
<body class="studio-body">
    <header id="global-header" class="sticky-top"></header>
    
    <main class="container-fluid my-5 py-4">
        <div class="page-shell">
            
            <div class="text-start mb-4">
                <a href="index.html" class="text-decoration-none" style="color: #FF0000; font-family: 'Special Elite', monospace; letter-spacing: 0.1em; font-size: 0.9rem; font-weight: bold;">
                    <i class="fa-solid fa-arrow-left me-2"></i> BACK
                </a>
            </div>

            <h1 class="page-title text-start mb-2">CONTACT US</h1>
            <div class="red-accent-line"></div>
            
            <div class="row g-5">
                <div class="col-md-5">
                    <h2 class="display-6 text-uppercase fw-bold text-white mb-4" style="font-family: 'Impact', sans-serif; letter-spacing: 0.05em;">C4 HQ</h2>
                    
                    <div class="mb-4">
                        <span class="text-red-label text-start mb-1" style="width: auto !important; float: none !important; clear: none !important;">// STUDIO ADDRESS</span>
                        <p class="fs-5 text-white mb-0" style="font-family: 'Arial', sans-serif;">ermou 509321</p>
                        <p class="text-white">Athens, Greece</p>
                    </div>

                    <div class="mb-4">
                        <span class="text-red-label text-start mb-1" style="width: auto !important; float: none !important; clear: none !important;">// PHONE NUMBER</span>
                        <p class="fs-5 text-white mb-0" style="font-family: 'Arial', sans-serif;">+30 6952095981</p>
                        <p class="text-white">info@c4tattoo.com</p>
                    </div>
                </div>

                <div class="col-md-7">
                    <h2 class="display-6 text-uppercase fw-bold text-white mb-4" style="font-family: 'Impact', sans-serif; letter-spacing: 0.05em;">CONTACT FORM</h2>
                    
                    <form action="#" method="POST" onsubmit="event.preventDefault();">
                        <div class="row g-3">
                            <div class="col-sm-6">
                                <label class="text-red-label text-start mb-1" style="width: auto !important; float: none !important; clear: none !important;">Name</label>
                                <input type="text" class="form-control" placeholder="e.g. Alex" required style="background: #111111; color: #ffffff; border: 1px solid #222222; border-radius: 0px; padding: 12px;">
                            </div>
                            <div class="col-sm-6">
                                <label class="text-red-label text-start mb-1" style="width: auto !important; float: none !important; clear: none !important;">E-mail</label>
                                <input type="email" class="form-control" placeholder="name@domain.com" required style="background: #111111; color: #ffffff; border: 1px solid #222222; border-radius: 0px; padding: 12px;">
                            </div>
                            <div class="col-12">
                                <label class="text-red-label text-start mb-1" style="width: auto !important; float: none !important; clear: none !important;">Subject</label>
                                <input type="text" class="form-control" placeholder="e.g. Custom Sleeve Inquiry" required style="background: #111111; color: #ffffff; border: 1px solid #222222; border-radius: 0px; padding: 12px;">
                            </div>
                            <div class="col-12">
                                <label class="text-red-label text-start mb-1" style="width: auto !important; float: none !important; clear: none !important;">Message</label>
                                <textarea class="form-control" rows="5" placeholder="Describe your tattoo concept, size parameters, placement ideas, or custom piercing configurations..." required style="background: #111111; color: #ffffff; border: 1px solid #222222; border-radius: 0px; padding: 12px; resize: none;"></textarea>
                            </div>
                            <div class="col-12 pt-2">
                                <button type="submit" class="btn btn-red px-5 py-3" style="float: left !important;">Send Message</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
            
        </div>
    </main>
    <footer id="global-footer"></footer>
</body>
</html>
